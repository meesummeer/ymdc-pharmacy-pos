<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS — YMDC Pharmacy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <img src="logo.jpeg" alt="YMDC Logo" class="brand-logo" width="40" height="40">
          <div class="brand-text">
            <h1>Yaseen Medical &amp; General Store</h1>
            <span class="short">YMDC</span>
          </div>
        </div>
        <nav class="main-nav">
          <a href="index.html" class="nav-link active" data-page="pos">POS</a>
          <a href="inventory.html" class="nav-link" data-page="inventory">Inventory</a>
          <a href="history.html" class="nav-link" data-page="history">History</a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <h2 class="page-title">Point of Sale</h2>

      <div class="card">
        <div class="form-group">
          <label for="search-input" class="form-label">Search Item</label>
          <div class="search-wrapper">
            <input type="text" id="search-input" class="input-lg input-search" placeholder="Search items…" autocomplete="off">
            <div id="search-dropdown" class="search-dropdown"></div>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:0">
          <label for="patient-name" class="form-label">Patient Name <span style="color:var(--error)">*</span></label>
          <input type="text" id="patient-name" class="input-lg" style="padding-left:16px" placeholder="Enter patient name" required>
          <span class="field-error" id="patient-error">Patient name is required</span>
        </div>
      </div>

      <div class="card" id="cart-section" style="display:none">
        <h3 class="card-title">Cart</h3>
        <div class="table-wrapper">
          <table id="cart-table" class="cart-table">
            <thead>
              <tr>
                <th>Item Name</th>
                <th>Qty</th>
                <th class="num">Unit Price</th>
                <th class="num">Line Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cart-body"></tbody>
          </table>
        </div>
        <div class="cart-total-bar">
          <span>Grand Total</span>
          <span class="total-amount" id="grand-total">PKR 0</span>
        </div>
        <div class="btn-group" style="margin-top:16px">
          <button class="btn btn-primary" id="btn-save" disabled>Save Invoice</button>
          <button class="btn btn-secondary" id="btn-clear-cart">Clear Cart</button>
        </div>
      </div>

      <div id="post-save-actions" class="card post-save-actions" hidden>
        <p id="save-success-msg" class="save-success-msg"></p>
        <button type="button" class="btn btn-gold" id="btn-print-receipt">Print Receipt</button>
      </div>

      <div id="empty-cart" class="card empty-state">
        <div class="empty-state-icon">🛒</div>
        <p>Search and select items above to start a sale.</p>
      </div>
    </main>

    <footer class="site-footer">
      Made by Meesum Mir · Yaseen Medical &amp; Diagnostic Centre · 2026
    </footer>
  </div>

  <div id="receipt-print-area" aria-hidden="true"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let inventory = [];
    let cart = [];
    let highlightIndex = -1;
    let lastSavedInvoice = null;

    const searchInput = document.getElementById('search-input');
    const searchDropdown = document.getElementById('search-dropdown');
    const cartSection = document.getElementById('cart-section');
    const emptyCart = document.getElementById('empty-cart');
    const cartBody = document.getElementById('cart-body');
    const grandTotal = document.getElementById('grand-total');
    const btnSave = document.getElementById('btn-save');
    const btnClearCart = document.getElementById('btn-clear-cart');
    const patientInput = document.getElementById('patient-name');
    const patientError = document.getElementById('patient-error');
    const postSaveActions = document.getElementById('post-save-actions');
    const saveSuccessMsg = document.getElementById('save-success-msg');
    const btnPrintReceipt = document.getElementById('btn-print-receipt');

    setActiveNav('pos');

    async function loadInventory() {
      try {
        const data = await apiGet('inventory');
        inventory = data.items || [];
      } catch (err) {
        showToast('Failed to load inventory: ' + err.message, 'error');
        inventory = [];
      }
    }

    function getFilteredItems(query) {
      if (!query) return [];
      const q = query.toLowerCase();
      return inventory.filter(item => item.name.toLowerCase().includes(q)).slice(0, 20);
    }

    function renderDropdown(items) {
      if (!items.length) {
        searchDropdown.classList.remove('open');
        return;
      }
      searchDropdown.innerHTML = items.map((item, i) => `
        <div class="search-dropdown-item${i === highlightIndex ? ' highlighted' : ''}"
             data-id="${item.id}" data-index="${i}">
          <span>${escapeHtml(item.name)}</span>
          <span class="cat-badge ${categoryClass(item.category)}">${escapeHtml(item.category)}</span>
        </div>
      `).join('');
      searchDropdown.classList.add('open');
    }

    function addToCart(item) {
      const existing = cart.find(c => c.id === item.id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({
          id: item.id,
          name: item.name,
          category: item.category,
          qty: 1,
          price: Number(item.price) || 0,
        });
      }
      searchInput.value = '';
      searchDropdown.classList.remove('open');
      highlightIndex = -1;
      renderCart();
    }

    function updateGrandTotal() {
      const total = cart.reduce((sum, item) => sum + item.qty * (Number(item.price) || 0), 0);
      grandTotal.textContent = formatPKR(total);
    }

    function updateLineTotal(idx) {
      const row = cartBody.querySelector(`tr[data-idx="${idx}"]`);
      if (!row) return;
      const lineTotal = cart[idx].qty * (Number(cart[idx].price) || 0);
      const cell = row.querySelector('.line-total-cell');
      if (cell) cell.textContent = formatPKR(lineTotal);
    }

    function renderCart() {
      if (!cart.length) {
        cartSection.style.display = 'none';
        emptyCart.style.display = postSaveActions.hidden ? 'block' : 'none';
        btnSave.disabled = true;
        return;
      }
      cartSection.style.display = 'block';
      emptyCart.style.display = 'none';
      postSaveActions.hidden = true;
      btnSave.disabled = false;

      cartBody.innerHTML = cart.map((item, idx) => `
        <tr data-idx="${idx}">
          <td><strong>${escapeHtml(item.name)}</strong></td>
          <td>
            <div class="qty-controls">
              <button type="button" class="qty-btn" data-action="qty-minus" data-idx="${idx}">−</button>
              <input type="number" value="${item.qty}" min="1" class="qty-input" data-idx="${idx}">
              <button type="button" class="qty-btn" data-action="qty-plus" data-idx="${idx}">+</button>
            </div>
          </td>
          <td class="num">
            <div class="price-cell">
              <span class="price-prefix">PKR</span>
              <input type="number" class="price-input" value="${item.price}" min="0" step="1" data-idx="${idx}">
            </div>
          </td>
          <td class="num line-total-cell"><strong>${formatPKR(item.qty * (Number(item.price) || 0))}</strong></td>
          <td>
            <button type="button" class="btn btn-danger btn-icon" data-action="remove" data-idx="${idx}" title="Remove">×</button>
          </td>
        </tr>
      `).join('');

      updateGrandTotal();
    }

    cartBody.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const idx = parseInt(btn.dataset.idx, 10);
      if (btn.dataset.action === 'qty-minus') {
        cart[idx].qty = Math.max(1, cart[idx].qty - 1);
        const input = cartBody.querySelector(`.qty-input[data-idx="${idx}"]`);
        if (input) input.value = cart[idx].qty;
        updateLineTotal(idx);
        updateGrandTotal();
      } else if (btn.dataset.action === 'qty-plus') {
        cart[idx].qty += 1;
        const input = cartBody.querySelector(`.qty-input[data-idx="${idx}"]`);
        if (input) input.value = cart[idx].qty;
        updateLineTotal(idx);
        updateGrandTotal();
      } else if (btn.dataset.action === 'remove') {
        cart.splice(idx, 1);
        renderCart();
      }
    });

    cartBody.addEventListener('input', (e) => {
      const idx = parseInt(e.target.dataset.idx, 10);
      if (Number.isNaN(idx) || !cart[idx]) return;
      if (e.target.classList.contains('price-input')) {
        cart[idx].price = Math.max(0, parseFloat(e.target.value) || 0);
        updateLineTotal(idx);
        updateGrandTotal();
      } else if (e.target.classList.contains('qty-input')) {
        cart[idx].qty = Math.max(1, parseInt(e.target.value, 10) || 1);
        updateLineTotal(idx);
        updateGrandTotal();
      }
    });

    cartBody.addEventListener('blur', (e) => {
      const idx = parseInt(e.target.dataset.idx, 10);
      if (Number.isNaN(idx) || !cart[idx]) return;
      if (e.target.classList.contains('qty-input')) {
        e.target.value = cart[idx].qty;
      }
    }, true);

    searchInput.addEventListener('input', () => {
      highlightIndex = -1;
      renderDropdown(getFilteredItems(searchInput.value.trim()));
    });

    searchInput.addEventListener('keydown', (e) => {
      const items = getFilteredItems(searchInput.value.trim());
      if (!items.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
        renderDropdown(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightIndex = Math.max(highlightIndex - 1, 0);
        renderDropdown(items);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        addToCart(items[highlightIndex >= 0 ? highlightIndex : 0]);
      } else if (e.key === 'Escape') {
        searchDropdown.classList.remove('open');
      }
    });

    searchDropdown.addEventListener('click', (e) => {
      const el = e.target.closest('.search-dropdown-item');
      if (!el) return;
      const item = inventory.find(i => i.id === el.dataset.id);
      if (item) addToCart(item);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) searchDropdown.classList.remove('open');
    });

    btnClearCart.addEventListener('click', () => {
      if (cart.length && confirm('Clear the entire cart?')) {
        cart = [];
        lastSavedInvoice = null;
        postSaveActions.hidden = true;
        renderCart();
      }
    });

    patientInput.addEventListener('input', () => {
      patientInput.classList.remove('input-error');
      patientError.classList.remove('visible');
    });

    btnPrintReceipt.addEventListener('click', () => {
      if (!lastSavedInvoice) return;
      printReceipt(lastSavedInvoice);
    });

    btnSave.addEventListener('click', async () => {
      if (!cart.length) return;
      const patientName = patientInput.value.trim();
      if (!patientName) {
        patientInput.classList.add('input-error');
        patientError.classList.add('visible');
        patientInput.focus();
        showToast('Patient name is required', 'error');
        return;
      }

      btnSave.disabled = true;
      btnSave.textContent = 'Saving…';
      postSaveActions.hidden = true;
      syncCartFromDOM(cartBody, cart);
      const saleData = buildSaleData(cart, patientName);
      console.log('SENDING:', JSON.stringify(saleData));

      try {
        const result = await apiPost(saleData);
        const items = cart.map(item => ({
          name: item.name,
          category: item.category,
          qty: item.qty,
          price: Number(item.price) || 0,
          lineTotal: item.qty * (Number(item.price) || 0),
        }));
        const total = items.reduce((sum, item) => sum + item.lineTotal, 0);
        lastSavedInvoice = {
          invoiceNo: result.invoiceNo,
          date: result.date || saleData.date,
          time: result.time || saleData.time,
          patientName,
          items,
          total: result.total != null ? result.total : total,
        };
        populateReceiptPrintArea(lastSavedInvoice);
        saveSuccessMsg.textContent = 'Invoice saved — ' + result.invoiceNo;
        postSaveActions.hidden = false;
        showToast('Invoice saved — ' + result.invoiceNo, 'success');
        cart = [];
        patientInput.value = '';
        patientInput.classList.remove('input-error');
        patientError.classList.remove('visible');
        renderCart();
      } catch (err) {
        showToast('Save failed: ' + err.message, 'error');
        btnSave.disabled = false;
      } finally {
        btnSave.textContent = 'Save Invoice';
      }
    });

    loadInventory();
  </script>
</body>
</html>
