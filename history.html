<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — YMDC Pharmacy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1>Yaseen Medical &amp; General Store</h1>
        <span class="short">YMDC</span>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link" data-page="pos">POS</a>
        <a href="inventory.html" class="nav-link" data-page="inventory">Inventory</a>
        <a href="history.html" class="nav-link active" data-page="history">History</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <h2 class="page-title">Invoice History</h2>

    <div class="filter-bar card" style="padding:1rem">
      <div class="form-group">
        <label for="date-from">From (DD/MM/YYYY)</label>
        <input type="text" id="date-from" placeholder="DD/MM/YYYY" maxlength="10">
      </div>
      <div class="form-group">
        <label for="date-to">To (DD/MM/YYYY)</label>
        <input type="text" id="date-to" placeholder="DD/MM/YYYY" maxlength="10">
      </div>
      <button class="btn btn-primary btn-sm" id="btn-filter" style="margin-bottom:0">Filter</button>
      <button class="btn btn-outline btn-sm" id="btn-clear-filter" style="margin-bottom:0">This Month</button>
    </div>

    <div id="history-container">
      <div class="card loading">Loading history</div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let allHistory = [];
    let expandedInvoice = null;

    const historyContainer = document.getElementById('history-container');

    setActiveNav('history');

    function setCurrentMonthFilter() {
      const range = getCurrentMonthRange();
      document.getElementById('date-from').value = range.from;
      document.getElementById('date-to').value = range.to;
    }

    async function loadHistory() {
      historyContainer.innerHTML = '<div class="card loading">Loading history</div>';
      try {
        const data = await apiGet('history');
        console.log('History API response:', JSON.stringify(data));
        allHistory = data.days || [];
        renderHistory();
      } catch (err) {
        historyContainer.innerHTML = `<div class="card empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
        showToast('Failed to load history: ' + err.message, 'error');
      }
    }

    function getDateFilter() {
      return {
        from: document.getElementById('date-from').value.trim(),
        to: document.getElementById('date-to').value.trim(),
      };
    }

    function renderInvoiceDetail(inv) {
      return `
        <tr class="invoice-detail-row">
          <td colspan="5">
            <div class="invoice-detail">
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Item</th>
                      <th>Category</th>
                      <th class="num">Qty</th>
                      <th class="num">Unit Price</th>
                      <th class="num">Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${inv.items.map(item => `
                      <tr>
                        <td>${escapeHtml(item.name || item.itemName)}</td>
                        <td>${escapeHtml(item.category)}</td>
                        <td class="num">${item.qty}</td>
                        <td class="num">${formatPKR(item.price != null ? item.price : item.unitPrice)}</td>
                        <td class="num">${formatPKR(item.lineTotal)}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                  <tfoot>
                    <tr>
                      <td colspan="4" style="text-align:right;font-weight:700">Total</td>
                      <td class="num" style="font-weight:700">${formatPKR(inv.total)}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          </td>
        </tr>
      `;
    }

    function renderHistory() {
      const { from, to } = getDateFilter();
      let days = allHistory
        .map(day => ({
          ...day,
          invoices: day.invoices.filter(inv => dateInRange(inv.date, from, to)),
        }))
        .filter(day => day.invoices.length > 0);

      if (!days.length) {
        historyContainer.innerHTML = '<div class="card empty-state">No invoices found for this period.</div>';
        return;
      }

      historyContainer.innerHTML = days.map(day => `
        <div class="date-separator">${formatDate(day.date)}</div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Invoice No</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Patient Name</th>
                  <th class="num">Total Amount</th>
                </tr>
              </thead>
              <tbody>
                ${day.invoices.map(inv => {
                  const isExpanded = expandedInvoice === inv.invoiceNo;
                  return `
                    <tr class="history-row${isExpanded ? ' expanded' : ''}" data-invoice="${escapeHtml(inv.invoiceNo)}">
                      <td>${escapeHtml(inv.invoiceNo)}${isExpanded ? ' ▾' : ' ▸'}</td>
                      <td>${formatDate(inv.date)}</td>
                      <td>${escapeHtml(inv.time)}</td>
                      <td>${inv.patientName ? escapeHtml(inv.patientName) : '—'}</td>
                      <td class="num">${formatPKR(inv.total)}</td>
                    </tr>
                    ${isExpanded ? renderInvoiceDetail(inv) : ''}
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
          <div style="padding:0.5rem 0.75rem;background:var(--gray-50);font-size:0.85rem;color:var(--gray-700);text-align:right">
            ${day.invoices.length} invoice${day.invoices.length !== 1 ? 's' : ''} &middot; Revenue: <strong>${formatPKR(day.totalRevenue)}</strong>
          </div>
        </div>
      `).join('');
    }

    historyContainer.addEventListener('click', (e) => {
      const row = e.target.closest('.history-row[data-invoice]');
      if (!row) return;
      const invoiceNo = row.dataset.invoice;
      expandedInvoice = expandedInvoice === invoiceNo ? null : invoiceNo;
      renderHistory();
    });

    document.getElementById('btn-filter').addEventListener('click', () => {
      expandedInvoice = null;
      renderHistory();
    });

    document.getElementById('btn-clear-filter').addEventListener('click', () => {
      setCurrentMonthFilter();
      expandedInvoice = null;
      renderHistory();
    });

    setCurrentMonthFilter();
    loadHistory();
  </script>
</body>
</html>
