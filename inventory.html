<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — YMDC Pharmacy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <img src="logo.jpeg" alt="YMDC Logo" class="brand-logo" width="40" height="40">
          <div class="brand-text">
            <h1>Yaseen Medical &amp; General Store</h1>
            <span class="short">YMDC</span>
          </div>
        </div>
        <nav class="main-nav">
          <a href="index.html" class="nav-link" data-page="pos">POS</a>
          <a href="inventory.html" class="nav-link active" data-page="inventory">Inventory</a>
          <a href="history.html" class="nav-link" data-page="history">History</a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <div class="page-header-row">
        <h2 class="page-title">Inventory Management</h2>
        <button class="btn btn-primary" id="btn-add-item">+ Add Item</button>
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:20px 24px 12px">
          <input type="text" id="filter-input" placeholder="Filter by name or category…">
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Item Name</th>
                <th>Category</th>
                <th class="num">Default Price</th>
                <th style="width:100px">Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-body">
              <tr><td colspan="4" class="loading">Loading inventory</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      Made by Meesum Mir · Yaseen Medical &amp; Diagnostic Centre · 2026
    </footer>
  </div>

  <div class="modal-overlay" id="item-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Item</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label for="item-name" class="form-label">Item Name</label>
          <input type="text" id="item-name" required>
        </div>
        <div class="form-group">
          <label for="item-category" class="form-label">Category</label>
          <select id="item-category">
            <option value="Medicine">Medicine</option>
            <option value="Snack">Snack</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="item-price" class="form-label">Default Price (PKR)</label>
          <input type="number" id="item-price" min="0" step="1" value="0">
          <small style="color:var(--text-secondary);font-size:12px;margin-top:4px;display:block">Leave 0 if price is entered at sale</small>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let allItems = [];
    let filterText = '';

    const inventoryBody = document.getElementById('inventory-body');
    const itemModal = document.getElementById('item-modal');
    const modalTitle = document.getElementById('modal-title');
    const editId = document.getElementById('edit-id');
    const itemName = document.getElementById('item-name');
    const itemCategory = document.getElementById('item-category');
    const itemPrice = document.getElementById('item-price');

    setActiveNav('inventory');

    async function loadInventory() {
      inventoryBody.innerHTML = '<tr><td colspan="4" class="loading">Loading inventory</td></tr>';
      try {
        const data = await apiGet('inventory');
        allItems = data.items || [];
        renderTable();
      } catch (err) {
        inventoryBody.innerHTML = `<tr><td colspan="4" class="empty-state">Failed to load: ${escapeHtml(err.message)}</td></tr>`;
        showToast('Failed to load inventory: ' + err.message, 'error');
      }
    }

    function getFiltered() {
      if (!filterText) return allItems;
      const q = filterText.toLowerCase();
      return allItems.filter(item =>
        item.name.toLowerCase().includes(q) ||
        item.category.toLowerCase().includes(q)
      );
    }

    function renderTable() {
      const items = getFiltered();
      if (!items.length) {
        inventoryBody.innerHTML = '<tr><td colspan="4" class="empty-state">No items found.</td></tr>';
        return;
      }
      inventoryBody.innerHTML = items.map(item => `
        <tr data-id="${escapeHtml(item.id)}">
          <td><strong>${escapeHtml(item.name)}</strong></td>
          <td><span class="pill pill-${categoryClass(item.category)}">${escapeHtml(item.category)}</span></td>
          <td class="num">${item.price ? formatPKR(item.price) : '—'}</td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn-icon-only btn-edit" title="Edit item">✎</button>
              <button class="btn-icon-only danger btn-delete" title="Delete item">🗑</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function openModal(mode, item) {
      modalTitle.textContent = mode === 'edit' ? 'Edit Item' : 'Add Item';
      editId.value = item ? item.id : '';
      itemName.value = item ? item.name : '';
      itemCategory.value = item ? item.category : 'Medicine';
      itemPrice.value = item ? (item.price || 0) : 0;
      itemModal.classList.add('open');
      itemName.focus();
    }

    function closeModal() {
      itemModal.classList.remove('open');
    }

    inventoryBody.addEventListener('click', async (e) => {
      const row = e.target.closest('tr[data-id]');
      if (!row) return;
      const id = row.dataset.id;
      const item = allItems.find(i => i.id === id);
      if (!item) return;

      if (e.target.closest('.btn-edit')) {
        openModal('edit', item);
      } else if (e.target.closest('.btn-delete')) {
        if (!confirm(`Delete "${item.name}" from inventory?`)) return;
        try {
          await apiPost({ action: 'inventory', operation: 'delete', id });
          showToast('Item deleted', 'success');
          await loadInventory();
        } catch (err) {
          showToast('Delete failed: ' + err.message, 'error');
        }
      }
    });

    document.getElementById('btn-add-item').addEventListener('click', () => openModal('add'));
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    itemModal.addEventListener('click', (e) => { if (e.target === itemModal) closeModal(); });

    document.getElementById('modal-save').addEventListener('click', async () => {
      const name = itemName.value.trim();
      if (!name) {
        showToast('Item name is required', 'warning');
        return;
      }
      const payload = {
        action: 'inventory',
        operation: editId.value ? 'edit' : 'add',
        id: editId.value || undefined,
        name,
        category: itemCategory.value,
        price: parseFloat(itemPrice.value) || 0,
      };
      try {
        await apiPost(payload);
        showToast(editId.value ? 'Item updated' : 'Item added', 'success');
        closeModal();
        await loadInventory();
      } catch (err) {
        showToast('Save failed: ' + err.message, 'error');
      }
    });

    document.getElementById('filter-input').addEventListener('input', (e) => {
      filterText = e.target.value.trim();
      renderTable();
    });

    loadInventory();
  </script>
</body>
</html>
